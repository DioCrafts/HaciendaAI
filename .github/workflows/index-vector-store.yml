name: Index vector store

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Proveedor de embeddings."
        required: true
        type: choice
        default: hash
        options:
          - hash
          - voyage
      store:
        description: "Backend del vector store."
        required: true
        type: choice
        default: memory
        options:
          - memory
          - qdrant
      collection:
        description: "Nombre de la colección."
        required: false
        type: string
        default: hacienda_corpus_v1
      only:
        description: "Limitar a una fuente (o 'all' para todo el corpus)."
        required: false
        type: choice
        default: all
        options:
          - all
          - normas
          - jurisprudencia
          - dgt
          - teac
          - manuales

  # Reindexa cuando se mergea un PR de ingesta (cualquier cambio en
  # data/). Solo dispara reindex completo si la rama destino es main.
  push:
    branches: [main]
    paths:
      - "src/hacienda_ai/data/**"

  # Cron semanal de respaldo (lunes 04:00 UTC). Por defecto corre con
  # provider=hash + store=memory para no incurrir en coste sin secrets.
  # Cuando VOYAGE_API_KEY y QDRANT_URL estén configurados como secrets
  # del repo, editar el step "Resolve config" para promover a voyage+qdrant.
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

concurrency:
  # Si llegan varios pushes a main muy seguidos (p.ej. dos PRs de ingesta),
  # serializamos sobre la colección para evitar dos upserts concurrentes.
  group: index-vector-store-${{ github.event.inputs.collection || 'hacienda_corpus_v1' }}
  cancel-in-progress: false

jobs:
  index:
    name: Indexar corpus
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Resolve config
        # workflow_dispatch trae inputs del operador; push/schedule no, así
        # que aplicamos defaults seguros (hash + memory + all). Cuando se
        # configuren los secrets VOYAGE_API_KEY/QDRANT_URL, basta con
        # cambiar PROVIDER_DEFAULT/STORE_DEFAULT abajo para promover el
        # pipeline automático a producción sin tocar workflow_dispatch.
        id: cfg
        run: |
          PROVIDER_DEFAULT=hash
          STORE_DEFAULT=memory
          PROVIDER="${{ github.event.inputs.provider }}"
          STORE="${{ github.event.inputs.store }}"
          COLLECTION="${{ github.event.inputs.collection }}"
          ONLY="${{ github.event.inputs.only }}"
          : "${PROVIDER:=$PROVIDER_DEFAULT}"
          : "${STORE:=$STORE_DEFAULT}"
          : "${COLLECTION:=hacienda_corpus_v1}"
          : "${ONLY:=all}"
          echo "provider=${PROVIDER}" >> "${GITHUB_OUTPUT}"
          echo "store=${STORE}" >> "${GITHUB_OUTPUT}"
          echo "collection=${COLLECTION}" >> "${GITHUB_OUTPUT}"
          echo "only=${ONLY}" >> "${GITHUB_OUTPUT}"
          echo "event=${{ github.event_name }} provider=${PROVIDER} store=${STORE} only=${ONLY}"

      - name: Validate config
        # Solo bloqueamos si el operador pidió voyage/qdrant SIN secrets.
        # Los runs automáticos (push/schedule) usan hash+memory por defecto
        # y no necesitan secrets, así que pasan siempre.
        run: |
          if [ "${{ steps.cfg.outputs.provider }}" = "voyage" ] && [ -z "${{ secrets.VOYAGE_API_KEY }}" ]; then
            echo "::error::provider=voyage requiere secret VOYAGE_API_KEY"
            exit 1
          fi
          if [ "${{ steps.cfg.outputs.store }}" = "qdrant" ] && [ -z "${{ secrets.QDRANT_URL }}" ]; then
            echo "::error::store=qdrant requiere secret QDRANT_URL"
            exit 1
          fi

      - name: Run indexer
        id: indexer
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          set +e
          ARGS="--provider ${{ steps.cfg.outputs.provider }}"
          ARGS="$ARGS --store ${{ steps.cfg.outputs.store }}"
          ARGS="$ARGS --collection ${{ steps.cfg.outputs.collection }}"
          ARGS="$ARGS --only ${{ steps.cfg.outputs.only }}"
          if [ "${{ steps.cfg.outputs.store }}" = "qdrant" ]; then
            ARGS="$ARGS --qdrant-url ${{ secrets.QDRANT_URL }}"
            if [ -n "${{ secrets.QDRANT_API_KEY }}" ]; then
              ARGS="$ARGS --qdrant-api-key ${{ secrets.QDRANT_API_KEY }}"
            fi
          fi
          eval "python scripts/index_vector_store.py $ARGS"
          code=$?
          echo "exit_code=${code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Surface failure
        if: steps.indexer.outputs.exit_code != '0'
        run: |
          echo "::warning::indexer exit_code=${{ steps.indexer.outputs.exit_code }}"
          exit ${{ steps.indexer.outputs.exit_code }}
