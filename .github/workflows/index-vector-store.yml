name: Index vector store

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Proveedor de embeddings."
        required: true
        type: choice
        default: hash
        options:
          - hash
          - voyage
      store:
        description: "Backend del vector store."
        required: true
        type: choice
        default: memory
        options:
          - memory
          - qdrant
      collection:
        description: "Nombre de la colección."
        required: false
        type: string
        default: hacienda_corpus_v1
      only:
        description: "Limitar a una fuente (o 'all' para todo el corpus)."
        required: false
        type: choice
        default: all
        options:
          - all
          - normas
          - jurisprudencia
          - dgt
          - teac
          - manuales

  # Job programado opcional: si el corpus en `data/` cambia, podemos
  # programar reindexación. Por defecto no se ejecuta — debe activarse
  # solo si el operador ya tiene Qdrant + VOYAGE_API_KEY configurados.
  # schedule:
  #   - cron: "0 4 * * 1"  # lunes 04:00 UTC

permissions:
  contents: read

concurrency:
  group: index-vector-store-${{ github.event.inputs.collection }}
  cancel-in-progress: false

jobs:
  index:
    name: Indexar corpus
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate config
        run: |
          if [ "${{ github.event.inputs.provider }}" = "voyage" ] && [ -z "${{ secrets.VOYAGE_API_KEY }}" ]; then
            echo "::error::provider=voyage requiere secret VOYAGE_API_KEY"
            exit 1
          fi
          if [ "${{ github.event.inputs.store }}" = "qdrant" ] && [ -z "${{ secrets.QDRANT_URL }}" ]; then
            echo "::error::store=qdrant requiere secret QDRANT_URL"
            exit 1
          fi

      - name: Run indexer
        id: indexer
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          set +e
          ARGS="--provider ${{ github.event.inputs.provider }}"
          ARGS="$ARGS --store ${{ github.event.inputs.store }}"
          ARGS="$ARGS --collection ${{ github.event.inputs.collection }}"
          ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          if [ "${{ github.event.inputs.store }}" = "qdrant" ]; then
            ARGS="$ARGS --qdrant-url ${{ secrets.QDRANT_URL }}"
            if [ -n "${{ secrets.QDRANT_API_KEY }}" ]; then
              ARGS="$ARGS --qdrant-api-key ${{ secrets.QDRANT_API_KEY }}"
            fi
          fi
          eval "python scripts/index_vector_store.py $ARGS"
          code=$?
          echo "exit_code=${code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Surface failure
        if: steps.indexer.outputs.exit_code != '0'
        run: |
          echo "::warning::indexer exit_code=${{ steps.indexer.outputs.exit_code }}"
          exit ${{ steps.indexer.outputs.exit_code }}
