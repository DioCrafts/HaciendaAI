name: Ingest DGT consultas vinculantes

on:
  # Manual SOLO, mismo patrón que CENDOJ. La DGT no expone API REST
  # oficial y Petete no autoriza scraping masivo. El workflow se activa
  # cuando un operador tiene una lista de números (extraídos manualmente
  # del buscador Petete) que quiere incorporar al corpus.
  workflow_dispatch:
    inputs:
      numeros:
        description: "Lista de números separados por comas (ej. V0123-24,V0456-24)"
        required: true
        type: string
      client:
        description: "Origen: 'local' (fixtures/repo) o 'http' (experimental, contra Petete)"
        required: true
        type: choice
        default: local
        options:
          - local
          - http
      local_dir:
        description: "Solo si client=local: ruta del directorio con los HTML descargados."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ingest-dgt
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingerir consultas DGT y abrir PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Write input numeros to file
        run: |
          echo "${{ github.event.inputs.numeros }}" | tr ',' '\n' | sed 's/^[[:space:]]*//' > numeros-input.txt
          echo "Números solicitados:"
          cat numeros-input.txt

      - name: Run ingest
        id: ingest
        # Códigos (ver scripts/ingest_dgt.py):
        #   0 — todas procesadas (con aciertos/errores parciales).
        #   1 — uno o más fallaron en fetch/parse/build.
        #   2 — error fatal (args inválidos, cliente mal configurado).
        run: |
          set +e
          if [ "${{ github.event.inputs.client }}" = "local" ]; then
            python scripts/ingest_dgt.py \
              --numero-file numeros-input.txt \
              --client local \
              --local-dir "${{ github.event.inputs.local_dir }}" \
              --report ingest-report.json
          else
            python scripts/ingest_dgt.py \
              --numero-file numeros-input.txt \
              --client http \
              --report ingest-report.json
          fi
          code=$?
          echo "exit_code=${code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Fail on fatal error
        if: steps.ingest.outputs.exit_code == '2'
        run: |
          echo "::error::ingest_dgt.py salió con código 2 (configuración inválida). Revisar logs."
          exit 1

      - name: Check for working-tree changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain src/hacienda_ai/data/dgt_consultas)" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Render PR body
        if: steps.diff.outputs.changed == 'true'
        run: |
          python - <<'PY' > pr-body.md
          import json
          import pathlib

          data = json.loads(pathlib.Path("ingest-report.json").read_text())
          totals = data.get("totals", {})
          by_imp = data.get("by_impuesto", {})
          outcomes = data.get("outcomes", [])

          lines = [
              "## Ingesta de consultas vinculantes DGT\n",
              "Este PR ha sido abierto por el workflow manual "
              "`ingest-dgt.yml`. **Requiere revisión humana** antes de "
              "mergear, especialmente del campo `criterio` (extraído "
              "heurísticamente, marcado `criterio_confidence=auto`).\n",
              f"- Aceptadas: **{totals.get('accepted', 0)}** "
              f"(nuevas: {totals.get('newly_persisted', 0)})",
              f"- Errores: {totals.get('errored', 0)}",
              "",
              "**Por impuesto:** "
              + ", ".join(f"{k.upper()}={v}" for k, v in by_imp.items() if v > 0),
              "",
          ]

          accepted = [o for o in outcomes if o.get("accepted")]
          if accepted:
              lines.append("### Consultas aceptadas")
              lines.append("| Número | Impuesto | Asunto | Nueva |")
              lines.append("|---|---|---|---|")
              for o in accepted:
                  is_new = "✅" if o.get("newly_persisted") else "—"
                  asunto = (o.get("asunto") or "").replace("|", "\\|")
                  if len(asunto) > 80:
                      asunto = asunto[:77] + "…"
                  lines.append(
                      f"| `{o['numero']}` | "
                      f"{(o.get('impuesto') or '?').upper()} | "
                      f"{asunto} | {is_new} |"
                  )

          errored = [o for o in outcomes if o.get("error")]
          if errored:
              lines.append("\n### Errores")
              for o in errored:
                  lines.append(f"- `{o['numero']}`: {o['error']}")

          lines.append("\n## Cómo revisar este PR\n")
          lines.append(
              "1. Abrir cada JSON y verificar que la cabecera (impuesto, "
              "fecha, normativa) es coherente con el contenido de la "
              "consulta.\n"
              "2. **Revisar `criterio`**: el extracto heurístico puede no "
              "ser el verdadero criterio doctrinal. Si lo validas, edita "
              "el campo y promueve `criterio_confidence` a `manual` para "
              "que el LLM lo cite como criterio firme DGT.\n"
              "3. Verificar `normativa`: las citas se extraen por regex y "
              "pueden faltar algunas o sobrar fragmentos.\n"
              "4. Recordar al LLM que las consultas DGT son vinculantes "
              "para la AEAT (art. 89 LGT) pero NO para los tribunales — "
              "el LLM debe distinguir al citar.\n"
          )
          print("\n".join(lines))
          PY

      - name: Upload report artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ingest-dgt-report
          path: |
            ingest-report.json
            pr-body.md
            numeros-input.txt
          retention-days: 30

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/ingest-dgt-${{ github.run_id }}
          title: "Ingesta DGT: nuevas consultas vinculantes"
          body-path: pr-body.md
          commit-message: |
            chore(corpus): ingesta DGT de consultas vinculantes

            Procesa una lista de números de consulta vinculante y añade
            las consultas en data/dgt_consultas/<año>/. Cada entrada
            incluye criterio extraído heurísticamente (marcado como
            `auto` — promover a `manual` tras validación humana),
            normativa detectada y clasificación por impuesto principal.
          author: "haciendaai-bot <bot@haciendaai.local>"
          committer: "haciendaai-bot <bot@haciendaai.local>"
          labels: |
            ingesta-dgt
            requiere-revision
            doctrina-administrativa

      - name: Surface partial failure as warning
        if: steps.ingest.outputs.exit_code == '1'
        run: |
          echo "::warning::ingest_dgt.py salió con código 1 (fallos parciales). El PR contiene solo las consultas que sí se procesaron."
