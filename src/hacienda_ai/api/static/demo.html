<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>HaciendaAI — Demo IRPF 2024</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --primary: #2657c6; --primary-hover: #1a44a3; --warning: #d6a900;
          --warning-bg: #fff4cc; --ok: #195e19; --ok-bg: #d6f1d6;
          --pend: #8a4d00; --pend-bg: #ffe7c6; --bad: #8a1a1a; --bad-bg: #ffd6d6;
          --muted: #555; --border: #e3e3e3; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
         max-width: 1140px; margin: 0 auto; padding: 16px 20px; color: #1a1a1a; line-height: 1.4; }
  header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { margin: 4px 0; font-size: 1.35em; }
  .disclaimer { background: var(--warning-bg); border-left: 4px solid var(--warning);
                padding: 9px 12px; margin: 8px 0; font-size: 0.88em; }
  .corpus { color: var(--muted); font-size: 0.84em; margin: 6px 0 14px; }
  details.profile { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; }
  details.profile > summary { cursor: pointer; font-weight: 600; padding: 4px 0; }
  form { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
         gap: 8px 14px; margin: 10px 0; }
  label { display: flex; flex-direction: column; font-size: 0.82em; color: #333; }
  input, select, textarea { padding: 6px 8px; font: inherit; font-size: 0.95em;
                            border: 1px solid #ccc; border-radius: 3px; background: white; }
  textarea { resize: vertical; min-height: 40px; }
  .actions { grid-column: 1 / -1; display: flex; gap: 8px; }
  button { padding: 8px 16px; font: inherit; background: var(--primary); color: white;
           border: 0; border-radius: 3px; cursor: pointer; font-weight: 500; }
  button:hover { background: var(--primary-hover); }
  button.secondary { background: white; color: var(--primary); border: 1px solid var(--primary); }
  .summary { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; font-size: 0.85em; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84em; margin-top: 6px; }
  th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { background: #f6f7f8; font-weight: 600; }
  .status { font-weight: 600; padding: 2px 7px; border-radius: 3px; display: inline-block;
            font-size: 0.85em; white-space: nowrap; }
  .status-applies { background: var(--ok-bg); color: var(--ok); }
  .status-does_not_apply { background: #eee; color: var(--muted); }
  .status-missing_data, .status-missing_evidence { background: var(--pend-bg); color: var(--pend); }
  .status-pending_validation { background: var(--bad-bg); color: var(--bad); }
  .risk-low { color: var(--ok); }
  .risk-medium { color: var(--pend); }
  .risk-high { color: var(--bad); }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .legend { font-size: 0.75em; color: #777; margin: 10px 0; }
  .error { color: var(--bad); padding: 8px 12px; background: var(--bad-bg); border-radius: 3px; }
  .version-line { color: var(--muted); font-size: 0.82em; font-style: italic; }
</style>
</head>
<body>
  <header>
    <h1>HaciendaAI — Motor IRPF 2024 (demo)</h1>
    <span id="meta-pill" class="corpus" style="margin:0">Cargando…</span>
  </header>
  <div id="disclaimer-box" class="disclaimer">Cargando avisos legales…</div>

  <details class="profile" open>
    <summary>Perfil fiscal sintético</summary>
    <form id="profile-form">
      <label>Ejercicio fiscal
        <input type="number" name="tax_year" value="2024" required min="2000" max="2100">
      </label>
      <label>Fecha del devengo (opcional, default 31-dic)
        <input type="date" name="devengo_date" value="">
      </label>
      <label>CCAA de residencia
        <input type="text" name="region" value="Madrid" required>
      </label>
      <label>Modo de declaración
        <select name="filing_mode">
          <option value="individual">Individual</option>
          <option value="conjunta">Conjunta</option>
        </select>
      </label>
      <label>Hijos a cargo (menores 25 o discapacidad)
        <input type="number" name="children_count" value="1" min="0">
      </label>
      <label>De los anteriores, menores de 3
        <input type="number" name="children_young_count" value="0" min="0">
      </label>
      <label>Ascendientes a cargo (>65 o discapacidad)
        <input type="number" name="ascendants_count" value="0" min="0">
      </label>
      <label>De los anteriores, mayores de 75
        <input type="number" name="ascendants_over_75_count" value="0" min="0">
      </label>
      <label>Familia numerosa
        <select name="numerous_family_category">
          <option value="">No</option>
          <option value="general">General</option>
          <option value="especial">Especial</option>
        </select>
      </label>
      <label>Unidad familiar (si tributa conjunta)
        <select name="unit_type">
          <option value="">N/A</option>
          <option value="biparental">Biparental</option>
          <option value="monoparental">Monoparental</option>
        </select>
      </label>
      <label>Discapacidad del contribuyente
        <select name="has_disability">
          <option value="false">No</option>
          <option value="true">Sí</option>
        </select>
      </label>
      <label>Grado discapacidad (%)
        <input type="number" name="disability_degree" value="0" min="0" max="100">
      </label>
      <label>Necesita asistencia/movilidad reducida
        <select name="needs_assistance">
          <option value="false">No</option>
          <option value="true">Sí</option>
        </select>
      </label>
      <label>Género (deducción maternidad)
        <select name="gender">
          <option value="">No indicado</option>
          <option value="F">F</option>
          <option value="M">M</option>
        </select>
      </label>
      <label>Rendimientos íntegros del trabajo (€)
        <input type="number" name="work_gross" value="30000" min="0" step="0.01">
      </label>
      <label>Rendimientos netos del trabajo (€)
        <input type="number" name="work_net" value="27500" min="0" step="0.01">
      </label>
      <label>Aportaciones a planes de pensiones (€)
        <input type="number" name="pension_plan_individual" value="0" min="0" step="0.01">
      </label>
      <label>Donativos Ley 49/2002 (€)
        <input type="number" name="donations_general" value="0" min="0" step="0.01">
      </label>
      <label>Documentos disponibles (uno por línea)
        <textarea name="documents" rows="4">Libro de familia o certificado de convivencia
Libro de familia
Justificante de alta en SS o prestación
Certificado de convivencia con el ascendiente
Justificante de edad del ascendiente
Certificado de discapacidad vigente
Certificado de discapacidad vigente con grado ≥65%
Certificado de discapacidad con mención de asistencia/movilidad reducida
Certificado de la entidad gestora del plan
Título vigente de familia numerosa
Título vigente de familia numerosa especial</textarea>
      </label>
      <div class="actions">
        <button type="submit">Evaluar</button>
        <button type="button" class="secondary" id="reset-btn">Reset</button>
      </div>
    </form>
  </details>

  <div id="results"></div>

  <script>
    const STATUS_LABEL = {
      applies: 'Aplica',
      does_not_apply: 'No aplica',
      missing_data: 'Faltan datos',
      missing_evidence: 'Faltan justificantes',
      pending_validation: 'Pendiente de validar',
    };
    const eurFmt = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });

    async function loadMeta() {
      try {
        const r = await fetch('/deductions');
        const data = await r.json();
        document.getElementById('disclaimer-box').textContent = data.disclaimer;
        document.getElementById('meta-pill').innerHTML =
          `<strong>${data.corpus.count}</strong> deducciones · ` +
          `revisión <strong>${data.corpus.last_reviewed_at ?? 'N/A'}</strong> · ` +
          `motor v${data.corpus.engine_version}`;
      } catch (e) {
        document.getElementById('disclaimer-box').textContent =
          'No se pudo cargar el corpus. Asegúrate de que la API esté arrancada.';
      }
    }

    function buildProfile(form) {
      const f = new FormData(form);
      const num = (k) => { const v = f.get(k); return v === null || v === '' ? null : Number(v); };
      const bool = (k) => f.get(k) === 'true';
      const str = (k) => { const v = f.get(k); return v === null || v === '' ? null : v; };
      const docs = (f.get('documents') || '').split('\n').map(s => s.trim()).filter(Boolean);
      return {
        tax_year: num('tax_year'),
        devengo_date: str('devengo_date'),
        region: str('region') || 'unknown',
        filing_mode: str('filing_mode') || 'individual',
        personal: {
          has_disability: bool('has_disability'),
          disability_degree: num('disability_degree') ?? 0,
          needs_assistance: bool('needs_assistance'),
          gender: str('gender'),
        },
        family: {
          children_count: num('children_count'),
          children_young_count: num('children_young_count'),
          ascendants_count: num('ascendants_count'),
          ascendants_over_75_count: num('ascendants_over_75_count') ?? 0,
          numerous_family_category: str('numerous_family_category'),
          unit_type: str('unit_type'),
        },
        income: {
          work_gross: num('work_gross'),
          work_net: num('work_net'),
        },
        expenses: {
          pension_plan_individual: num('pension_plan_individual') ?? 0,
          donations_general: num('donations_general') ?? 0,
        },
        documents: docs,
      };
    }

    function renderSources(sources) {
      return sources.map(s => {
        const label = `${s.boe_id ?? '—'} ${s.article ?? ''}${s.paragraph ? ' §' + s.paragraph : ''}`.trim();
        return s.pinpoint_url
          ? `<a target="_blank" rel="noopener" href="${s.pinpoint_url}">${label}</a>`
          : label;
      }).join('<br>');
    }

    function renderVersions(versions) {
      if (!versions || !versions.length) return '';
      return '<br><span class="version-line">' + versions.map(v => {
        const until = v.effective_to ? v.effective_to : 'hoy';
        const mod = v.modified_by_boe_id ? ` · mod. ${v.modified_by_boe_id}` : '';
        return `Redacción vigente ${v.effective_from} → ${until}${mod}`;
      }).join('<br>') + '</span>';
    }

    function renderResults(data) {
      const summary = data.evaluations.reduce((acc, e) => {
        acc[e.status] = (acc[e.status] || 0) + 1;
        return acc;
      }, {});
      const summaryHtml = Object.entries(summary).map(([k, v]) =>
        `<span class="status status-${k}">${STATUS_LABEL[k] ?? k}: ${v}</span>`
      ).join('');
      const rows = data.evaluations.map(e => `
        <tr>
          <td>${e.deduction_name}</td>
          <td><span class="status status-${e.status}">${STATUS_LABEL[e.status] ?? e.status}</span></td>
          <td>${e.estimated_amount > 0 ? eurFmt.format(e.estimated_amount) : ''}</td>
          <td class="risk-${e.risk_level}">${e.risk_level}</td>
          <td>${(e.confidence * 100).toFixed(0)}%</td>
          <td>${escapeHtml(e.reason)}${
            e.missing_fields.length ? '<br><em>Falta:</em> ' + e.missing_fields.map(escapeHtml).join(', ') : ''
          }${
            e.missing_documents.length ? '<br><em>Doc.:</em> ' + e.missing_documents.map(escapeHtml).join(', ') : ''
          }</td>
          <td>${renderSources(e.sources)}${renderVersions(e.applicable_versions)}</td>
        </tr>
      `).join('');
      document.getElementById('results').innerHTML = `
        <p>Devengo: <strong>${data.devengo_date}</strong> · evaluado en ${data.elapsed_ms} ms</p>
        <div class="summary">${summaryHtml}</div>
        <table>
          <thead>
            <tr>
              <th>Deducción</th><th>Estado</th><th>Importe est.</th>
              <th>Riesgo</th><th>Confianza</th><th>Motivo</th><th>Fuente (BOE)</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <p class="legend">Los importes lineales o tramificados publicados por AEAT (mínimos personales y familiares, gasto del trabajo, reducción art. 20 del tramo bajo, maternidad, familia numerosa, tributación conjunta) se calculan en el motor. Las reglas no lineales que escalan por base imponible (arrendamiento, donativos, Ceuta/Melilla, eficiencia energética, regímenes transitorios) se marcan en revisión manual hasta validación por asesor colegiado. Las citas enlazan al texto consolidado en BOE.</p>
      `;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
      ));
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const out = document.getElementById('results');
      out.innerHTML = '<p>Evaluando…</p>';
      const profile = buildProfile(e.target);
      try {
        const r1 = await fetch('/profiles', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(profile),
        });
        if (!r1.ok) {
          const err = await r1.json().catch(() => ({ detail: r1.statusText }));
          out.innerHTML = `<p class="error">Perfil inválido: ${escapeHtml(err.detail ?? '')}</p>`;
          return;
        }
        const { profile_id } = await r1.json();
        const r2 = await fetch('/evaluations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile_id }),
        });
        renderResults(await r2.json());
      } catch (err) {
        out.innerHTML = `<p class="error">Error de red: ${escapeHtml(err.message)}</p>`;
      }
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      document.getElementById('profile-form').reset();
      document.getElementById('results').innerHTML = '';
    });

    loadMeta();
  </script>
</body>
</html>
